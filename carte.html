<style>
  body { overflow: hidden; }

  #map {

  }

  .header { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; z-index: 500; }

  /* LÉGENDE */
  .legend-bar {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 32px); max-width: 398px;
    background: rgba(17,21,37,.92); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px; z-index: 400;
    backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 10px;
  }
  .legend-gradient {
    flex: 1; height: 8px; border-radius: 4px;
    background: linear-gradient(to right, var(--red), var(--gold), var(--green));

  .legend-label { font-size: 10px; color: var(--muted); font-weight: 700; white-space: nowrap; }

  /* PANNEAU PAYS SÉLECTIONNÉ */

    border-radius: 16px 16px 0 0; padding: 16px;
    z-index: 450; transition: bottom .3s ease;

  .panel-handle {

  }
  .panel-top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;

  .panel-flag { font-size: 36px; }

/* ── Initialisation Leaflet ── */
const map = L.map('map', {
  center: [20, 10], zoom: 2, minZoom: 1, maxZoom: 6,
  zoomControl: true, attributionControl: false,
});

/* Fond de carte sombre */
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

/* Score ajusté avec pénalité guerre */
function adjustedScore(m) {
  return Math.max(0, m.score - m.wars * 5);
}
/* Couleur selon score ajusté */
function scoreColor(m) {
  const s = typeof m === 'object' ? adjustedScore(m) : m;
  if (s >= 70) return '#00d084';
  if (s >= 50) return '#4fffb0';
  if (s >= 30) return '#f5c842';
  if (s >= 15) return '#ff8c42';
  return '#ff3b5c';
}

/* Génération de coordonnées approximatives basées sur la région */
const regionBounds = {
  'Europe':       { minLat: 35, maxLat: 72, minLng: -12, maxLng: 32 },
  'Asie':         { minLat: 0, maxLat: 55, minLng: 60, maxLng: 150 },
  'Amériques':    { minLat: -55, maxLat: 72, minLng: -130, maxLng: -30 },
  'Afrique':      { minLat: -35, maxLat: 37, minLng: -18, maxLng: 52 },
  'Océanie':      { minLat: -50, maxLat: -5, minLng: 115, maxLng: 180 },
  'Moyen-Orient': { minLat: 12, maxLat: 40, minLng: 31, maxLng: 60 },
  'default':      { minLat: -20, maxLat: 40, minLng: -20, maxLng: 60 }
};

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getCoordinates(country) {
  // D'abord, essayer d'utiliser les coordonnées réelles
  if (countryCoords[country.code]) {
    return { lat: countryCoords[country.code][0], lng: countryCoords[country.code][1] };
  }
  // Sinon, générer des coordonnées approximatives basées sur la région
  const bounds = regionBounds[country.region] || regionBounds.default;
  const seed = hashString(country.code);
  const lat = bounds.minLat + (seed % 100) / 100 * (bounds.maxLat - bounds.minLat);
  const lng = bounds.minLng + ((seed >> 8) % 100) / 100 * (bounds.maxLng - bounds.minLng);
  return { lat, lng };
}

const panel = document.getElementById('country-panel');

function openPanel(m) {
  const col = scoreColor(m);
  document.getElementById('panel-flag').textContent  = m.flag;
  document.getElementById('panel-name').textContent  = m.name;
  document.getElementById('panel-rank').textContent  = `#${m.rank} MONDIAL`;
  document.getElementById('panel-score').textContent = adjustedScore(m).toFixed(1);
  document.getElementById('panel-score').style.color = col;
  document.getElementById('panel-link').href = `pays.html?code=${m.code}`;
  document.getElementById('panel-tags').innerHTML = `
    ${m.wars === 0
      ? '<span class="tag tag-peace">🕊️ 0 guerre</span>'
      : `<a href="conflits.html?country=${m.code}" class="tag tag-war">⚔️ ${m.wars} conflits</a>`}
    <a href="commerce.html?country=${m.code}" class="tag tag-trade">🤝 ${m.trade} accords</a>
  `;
  panel.classList.add('open');
}

async function loadCountries() {
  const countries = await fetchData('/countries');
  const markersCluster = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true
  });

  countries.forEach(c => {
    const coords = getCoordinates(c);
    const col = scoreColor(c);
    const size = Math.max(20, Math.min(36, c.score / 3)); // taille réduite
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${size}px;height:${size}px;border-radius:50%;
        background:${col};border:2px solid rgba(255,255,255,.2);
        display:flex;align-items:center;justify-content:center;
        font-size:${size * 0.4}px;cursor:pointer;
        box-shadow:0 0 ${size/2}px ${col}55;
      ">${c.flag}</div>`,
      iconSize: [size, size], iconAnchor: [size/2, size/2],
    });

    const marker = L.marker([coords.lat, coords.lng], { icon })
      .on('click', () => openPanel(c));
    markersCluster.addLayer(marker);
  });

  map.addLayer(markersCluster);
}

loadCountries();

/* Fermeture panneau sur clic carte */
map.on('click', () => panel.classList.remove('open'));

/* Nav tabs */
